name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          cp .build/apple/Products/Release/even even
          tar czf even-macos.tar.gz even
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: even-macos.tar.gz
          generate_release_notes: true
